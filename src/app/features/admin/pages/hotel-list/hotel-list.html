<div class="list-container">
  <div class="header-actions">
    <h2>Listado de Hoteles</h2>
    <button mat-raised-button color="primary" routerLink="../hoteles/nuevo">
      <mat-icon>add</mat-icon> Registrar Nuevo Hotel
    </button>
  </div>

  <table mat-table [dataSource]="dataSource()" class="mat-elevation-z2">

    <ng-container matColumnDef="nombre">
      <th mat-header-cell *matHeaderCellDef> Nombre </th>
      <td mat-cell *matCellDef="let hotel"> {{hotel.nombre}} </td>
    </ng-container>

    <ng-container matColumnDef="ubicacion">
      <th mat-header-cell *matHeaderCellDef> Ubicación </th>
      <td mat-cell *matCellDef="let hotel"> {{hotel.ubicacion}} </td>
    </ng-container>

    <ng-container matColumnDef="estado">
      <th mat-header-cell *matHeaderCellDef> Habilitado </th>
      <td mat-cell *matCellDef="let hotel">
        <mat-slide-toggle [checked]="hotel.estaHabilitado" (change)="toggleEstado(hotel)" color="primary">
        </mat-slide-toggle>
      </td>
    </ng-container>

    <ng-container matColumnDef="acciones">
      <th mat-header-cell *matHeaderCellDef> Acciones </th>
      <td mat-cell *matCellDef="let hotel">
        <button mat-icon-button color="accent" [routerLink]="['../hoteles/editar', hotel.id]" matTooltip="Editar Hotel">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="primary" [routerLink]="['../habitaciones', hotel.id]"
          matTooltip="Gestionar Habitaciones">
          <mat-icon>meeting_room</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  @if (dataSource().length === 0 && !loading()) {
  <div class="no-data">
    <p>No hay hoteles registrados.</p>
  </div>
  }

  @if (loading()) {
  <div class="loading-shade">
    <p>Cargando hoteles...</p>
  </div>
  }
</div>
